<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #141414;
            color: white;
        }

        .main-card {
            background-color: #222;
            border: none;
            border-radius: 15px;
        }

        .recommend-card {
            background-color: #222;
            border: none;
            border-radius: 15px;
        }

        .movie-item {
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }

        .movie-item:hover {
            background-color: #444;
        }

        .title {
            color: #e50914;
            font-weight: bold;
        }

        .searched-movie {
            color: #ffc107;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <!-- Search Form -->
        <div class="card main-card shadow-lg p-4">

            <h1 class="text-center mb-4 title">
                🎬 Movie Recommendation System
            </h1>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Select Category
                    </label>

                    <select name="category" class="form-select">

                        <option value="Hollywood">Hollywood</option>

                        <option value="hindi">Hindi (Bollywood)</option>

                        <option value="tamil">Tamil</option>

                        <option value="telugu">Telugu</option>

                        <option value="malayalam">Malayalam</option>

                        <option value="kannada">Kannada</option>

                        <option value="bengali">Bengali</option>

                        <option value="marathi">Marathi</option>

                        <option value="punjabi">Punjabi</option>

                    </select>
                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Enter Movie Name
                    </label>

                    <input
                        type="text"
                        name="movie"
                        class="form-control"
                        placeholder="Example: Avatar, Dangal, Vikram..."
                        required>

                </div>

                <div class="d-grid">

                    <button type="submit" class="btn btn-danger btn-lg">
                        Recommend Movies
                    </button>

                </div>

            </form>

        </div>

        <!-- Recommendations -->
        {% if recommendations %}

        <div class="card recommend-card shadow-lg mt-4 p-4">

            <h4 class="searched-movie">
                🔍 You searched for: {{ selected_movie }}
            </h4>

            <hr class="text-light">

            <h3 class="mb-3">
                Recommended Movies
            </h3>

            <ul class="list-group">

                {% for movie in recommendations %}

                <li class="list-group-item movie-item">
                    ⭐ {{ movie }}
                </li>

                {% endfor %}

            </ul>

        </div>

        {% endif %}

    </div>

</body>

</html>
